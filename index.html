<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solo Calisthenics System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="systemCanvas" aria-hidden="true"></canvas>
    <div class="shell">
      <header class="system-header">
        <div>
          <p class="eyebrow">Awakening Protocol</p>
          <h1>Calisthenics System</h1>
        </div>
        <div class="status-block" aria-label="Current status">
          <span>Level</span>
          <strong id="athleteLevel">1</strong>
          <small id="rankTitle">Novice Hunter</small>
          <div class="exp-meter" aria-label="Experience progress">
            <div class="exp-row">
              <b>EXP</b>
              <em id="expText">0/60</em>
            </div>
            <progress id="expBar" max="60" value="0"></progress>
          </div>
        </div>
      </header>

      <main class="dashboard">
        <aside class="side-rail">
          <section class="profile-panel" aria-label="Athlete stats">
            <div class="panel-heading">
              <span>Status</span>
              <button id="resetProgress" class="ghost-button" type="button">Reset Progress</button>
            </div>
            <div class="bars">
              <label>
                <span>HP</span>
                <progress id="hpBar" max="100" value="34"></progress>
                <b id="hpText">34/100</b>
              </label>
              <label>
                <span>MP</span>
                <progress id="mpBar" max="100" value="16"></progress>
                <b id="mpText">16/100</b>
              </label>
            </div>
            <div class="stats-grid">
              <div><span>STR</span><strong id="strStat">8</strong></div>
              <div><span>VIT</span><strong id="vitStat">8</strong></div>
              <div><span>AGI</span><strong id="agiStat">8</strong></div>
              <div><span>PER</span><strong id="perStat">8</strong></div>
            </div>
          </section>

          <section class="quest-panel daily-panel" aria-label="Daily goals">
            <div class="panel-heading">
              <span>Daily Quests</span>
              <small id="dayStamp"></small>
            </div>
            <div id="dailyGoals" class="quest-list compact"></div>
          </section>

          <section class="quest-panel" aria-label="Weekly goals">
            <div class="panel-heading">
              <span>Weekly Quests</span>
              <small id="weekStamp"></small>
            </div>
            <div id="weeklyGoals" class="quest-list"></div>
          </section>
        </aside>

        <section class="tree-panel" aria-label="Progression trees">
          <div class="tree-toolbar">
            <div class="segmented" role="tablist" aria-label="Progression mode">
              <button class="tab active" type="button" data-tree="push">Push</button>
              <button class="tab" type="button" data-tree="pull">Pull</button>
            </div>
            <div class="tree-summary">
              <span id="treeName">Push Skill Tree</span>
              <b id="treeCompletion">0%</b>
            </div>
            <div class="tree-actions">
              <button id="resetCurrentTree" class="ghost-button" type="button">Reset Tree</button>
              <button id="resetAllTrees" class="ghost-button danger" type="button">Reset All</button>
            </div>
          </div>
          <div id="treeGrid" class="tree-grid"></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
